services:
  app:
    build:
      context: .
      target: runner
    env_file:
      - ${SIGNAL_KIT_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: 3000
      BIND_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  migrate:
    build:
      context: .
      target: builder
    env_file:
      - ${SIGNAL_KIT_ENV_FILE:-.env}
    command: npm run db:migrate
    profiles:
      - tools
